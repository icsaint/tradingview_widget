<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* Menghilangkan margin dan membuat background transparan agar tidak ada sisa warna putih */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: transparent !important;
      overflow: hidden;
    }
    .tradingview-widget-container {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>

<div id="tradingview-wrapper" class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  </div>

<script type="text/javascript">
  function loadTradingView() {
    const wrapper = document.getElementById('tradingview-wrapper');
    const container = wrapper.querySelector('.tradingview-widget-container__widget');
    
    // 1. Deteksi tema sistem (Notion mengikuti tema sistem/browser)
    const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const currentTheme = isDark ? "dark" : "light";
    const bgColor = isDark ? "#191919" : "#ffffff"; // Warna khas Notion

    // 2. Bersihkan konten sebelumnya untuk re-render
    container.innerHTML = '';
    
    // 3. Buat elemen script secara dinamis dengan konfigurasi asli Anda
    const script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    script.async = true;

    // Struktur JSON asli Anda dengan perubahan otomatis pada 'theme' dan 'backgroundColor'
    const config = {
      "allow_symbol_change": true,
      "calendar": false,
      "details": false,
      "hide_side_toolbar": false,
      "hide_top_toolbar": false,
      "hide_legend": false,
      "hide_volume": false,
      "hotlist": false,
      "interval": "15",
      "locale": "en",
      "save_image": true,
      "style": "1",
      "symbol": "BINANCE:BTCUSDT",
      "theme": currentTheme, // OTOMATIS
      "timezone": "Asia/Jakarta",
      "backgroundColor": bgColor, // OTOMATIS
      "gridColor": "rgba(46, 46, 46, 0.06)",
      "watchlist": [],
      "withdateranges": false,
      "range": "1d",
      "compareSymbols": [],
      "show_popup_button": true,
      "popup_height": "650",
      "popup_width": "1000",
      "studies": [
        {
          "id": "STD;MA%1Cross"
        },
        {
          "id": "STD;RSI"
        }
      ],
      "autosize": true
    };

    script.innerHTML = JSON.stringify(config);
    wrapper.appendChild(script);
  }

  // Jalankan saat pertama kali dimuat
  loadTradingView();

  // Pantau jika pengguna mengganti tema tanpa me-refresh halaman
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', loadTradingView);
</script>

</body>
</html>
